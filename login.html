<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUFF - Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
        }

        /* Изображение в левом нижнем углу */
        .bottom-left-image {
            position: absolute;
            bottom: 20px;
            left: 10px;
            width: 300px;
            height: auto;
            opacity: 0.8;
        }

        /* Изображение в правом верхнем углу */
        .top-right-image {
            position: absolute;
            top: 0px;
            right: 10px;
            width: 450px;
            height: auto;
            opacity: 0.8;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
        }

        h1 {
            font-family: 'Times New Roman', serif;
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            text-align: center;
            display: block;
            width: 100%;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
        }

        input {
            width: 100%;
            padding: 15px;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .back-link {
            display: block;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #ffffff;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            .bottom-left-image { width: 150px; bottom: 100px; left: 10px; }
            .top-right-image { width: 200px; top: 0px; right: 10px; }
        }
    </style>
</head>
<body>
    <!-- Изображение в левом нижнем углу -->
    <img src="tri.jpg" alt="" class="bottom-left-image">

    <!-- Изображение в правом верхнем углу -->
    <img src="tri2.jpg" alt="" class="top-right-image">

    <div class="container">
        <h1>Вход</h1>
        
        <form>
            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn-submit">Войти</button>
        </form>
        
        <a href="index.html" class="back-link">← Вернуться на главную</a>
    </div>
<script>
    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        const response = await fetch('http://localhost:5000/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        
        const data = await response.json();
        
        if (response.ok) {
            localStorage.setItem('username', data.username);
            localStorage.setItem('userId', data.user_id);
            alert('Вход выполнен!');
            window.location.href = 'wall.html';
        } else {
            alert(data.error || 'Неверный логин или пароль');
        }
    });
</script>
</body>
</html>
